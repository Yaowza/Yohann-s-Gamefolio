# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://nunocoracao.github.io/blowfish/docs/getting-started/

timeout = "10m"
theme = "blowfish"
baseURL = "https://Yohann's_Gamefolio.com/"
defaultContentLanguage = "en"

enableRobotsTXT = true
[pagination]
  pagerSize = 20
summaryLength = 30

buildDrafts = false
buildFuture = false

[imaging]
  resampleFilter = "Box"
  quality = 75

enableEmoji = true


