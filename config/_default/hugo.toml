# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://nunocoracao.github.io/blowfish/docs/getting-started/

timeout = "10m"
theme = "blowfish"
baseURL = "https://yaowza.github.io/Yohann-s-Gamefolio/"
defaultContentLanguage = "en"
publishDir = "docs"

[build]
  useResourceCacheWhen = "never"

[deployment]
  [[deployment.targets]]
    name = "github"
    URL = "https://yaowza.github.io/Yohann-s-Gamefolio/"

enableRobotsTXT = true
[pagination]
  pagerSize = 20
summaryLength = 30

buildDrafts = false
buildFuture = false

[imaging]
  resampleFilter = "Box"
  quality = 75

enableEmoji = true

canonifyURLs = false
 relativeURLs = true

[params]
  fingerprint = false
  disableFingerprinting = true

